<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foco Radical | Receba suas fotos</title>
    <meta
      name="description"
      content="Receba automaticamente o link das fotos no seu WhatsApp assim que forem liberadas."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Poppins:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <img class="brand-logo" src="/logo_trimmed.png" alt="Foco Radical" />
      </header>

      <section class="hero" aria-label="Receba as fotos no WhatsApp">
        <div class="hero-copy">
          <p class="eyebrow">Campo Grande - MS</p>
          <h1>Receba automaticamente o link das fotos no seu WhatsApp assim que forem liberadas</h1>
          <p class="lead">Sem precisar procurar. Liberou, você recebe automaticamente.</p>
          <div class="hero-pill">
            <span aria-hidden="true">&#128247;</span>
            <span>Fotógrafo oficial da Foco Radical</span>
          </div>
        </div>

        <figure class="hero-art" aria-hidden="true">
          <img src="/person.png" alt="" />
        </figure>

        <aside class="form-shell">
          <form class="lead-form" id="leadForm" novalidate>
            <label for="whatsapp">WhatsApp</label>
            <input
              id="whatsapp"
              name="whatsapp"
              type="tel"
              inputmode="numeric"
              autocomplete="tel"
              placeholder="(65) 99999-0000"
              required
            />

            <fieldset>
              <legend>Onde você treina</legend>
              <div class="choice-grid">
                <button type="button" class="choice-chip" data-group="locais" data-value="Parque dos Poderes" aria-pressed="false">Parque dos Poderes</button>
                <button type="button" class="choice-chip" data-group="locais" data-value="Parque das Nações" aria-pressed="false">Parque das Nações</button>
                <button type="button" class="choice-chip" data-group="locais" data-value="Orla do Aeroporto" aria-pressed="false">Orla do Aeroporto</button>
              </div>
            </fieldset>

            <fieldset>
              <legend>Quais dias você vai?</legend>
              <div class="choice-grid days-grid">
                <button type="button" class="choice-chip" data-group="dias" data-value="Seg" aria-pressed="false">Seg</button>
                <button type="button" class="choice-chip" data-group="dias" data-value="Ter" aria-pressed="false">Ter</button>
                <button type="button" class="choice-chip" data-group="dias" data-value="Qua" aria-pressed="false">Qua</button>
                <button type="button" class="choice-chip" data-group="dias" data-value="Qui" aria-pressed="false">Qui</button>
                <button type="button" class="choice-chip" data-group="dias" data-value="Sex" aria-pressed="false">Sex</button>
                <button type="button" class="choice-chip" data-group="dias" data-value="Sáb" aria-pressed="false">Sáb</button>
                <button type="button" class="choice-chip" data-group="dias" data-value="Dom" aria-pressed="false">Dom</button>
              </div>
            </fieldset>

            <fieldset>
              <legend>Qual período você treina?</legend>
              <div class="choice-grid periods-grid">
                <button type="button" class="choice-chip" data-group="periodos" data-value="Manhã" aria-pressed="false">Manhã</button>
                <button type="button" class="choice-chip" data-group="periodos" data-value="Tarde" aria-pressed="false">Tarde</button>
                <button type="button" class="choice-chip" data-group="periodos" data-value="Noite" aria-pressed="false">Noite</button>
              </div>
            </fieldset>

            <button type="submit" class="cta" id="submitBtn">
              <span aria-hidden="true">&#128293;</span>
              <span>Quero receber automaticamente</span>
            </button>

            <p class="feedback" id="feedback" role="status" aria-live="polite"></p>
          </form>
        </aside>
      </section>

      <footer class="site-footer">CRIADO POR LUCAS BARBOSA</footer>
    </main>

    <script>
      const form = document.getElementById("leadForm");
      const phoneInput = document.getElementById("whatsapp");
      const feedback = document.getElementById("feedback");
      const submitBtn = document.getElementById("submitBtn");
      const REDIRECT_URL = "https://instagram.com/7dfotos";
      const ENDPOINT =
        "https://script.google.com/macros/s/AKfycbznY3tv9YAlvM8YWRhgxWrn4xrp_Vhppiukl-MjqrwefUYm3MIEuPua_qfpTB6t8QSBig/exec";
      const selected = {
        locais: new Set(),
        dias: new Set(),
        periodos: new Set(),
      };

      const onlyDigits = (value) => String(value || "").replace(/\D/g, "").slice(0, 11);

      const formatWhatsapp = (value) => {
        const digits = onlyDigits(value);
        if (digits.length <= 2) return digits;
        if (digits.length <= 7) return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
        return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7)}`;
      };

      const setFeedback = (type, message) => {
        feedback.className = `feedback${type ? ` ${type}` : ""}`;
        feedback.textContent = message;
      };

      const syncButtonState = (button) => {
        const group = button.dataset.group;
        const value = button.dataset.value;
        const isSelected = selected[group].has(value);
        button.classList.toggle("selected", isSelected);
        button.setAttribute("aria-pressed", String(isSelected));
      };

      document.querySelectorAll(".choice-chip").forEach((button) => {
        syncButtonState(button);

        button.addEventListener("click", () => {
          const group = button.dataset.group;
          const value = button.dataset.value;

          if (selected[group].has(value)) {
            selected[group].delete(value);
          } else {
            selected[group].add(value);
          }

          syncButtonState(button);
        });
      });

      phoneInput.addEventListener("input", (event) => {
        event.target.value = formatWhatsapp(event.target.value);
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const whatsapp = onlyDigits(phoneInput.value);

        if (whatsapp.length < 10) {
          setFeedback("error", "Digite um WhatsApp válido para continuar.");
          return;
        }

        submitBtn.disabled = true;
        setFeedback("loading", "Enviando seus dados...");

        try {
          const response = await fetch(ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              whatsapp,
              local: Array.from(selected.locais).join(", "),
              locais: Array.from(selected.locais),
              days: Array.from(selected.dias),
              periodos: Array.from(selected.periodos),
            }),
          });

          if (!response.ok) {
            const payload = await response.json().catch(() => null);
            throw new Error((payload && payload.error) || "Falha ao enviar o formulário");
          }

          setFeedback("success", "Perfeito! Redirecionando para o Instagram...");
          window.setTimeout(() => {
            window.location.href = REDIRECT_URL;
          }, 700);
        } catch (error) {
          setFeedback(
            "error",
            error && error.message
              ? error.message
              : "Não foi possível enviar agora. Tente novamente em instantes."
          );
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
