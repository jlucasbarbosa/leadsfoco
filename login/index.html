<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foco Radical | Login</title>
    <style>
      :root {
        --bg: #050607;
        --card: rgba(7, 8, 10, 0.86);
        --text: #f7f7f7;
        --muted: #b7bcc3;
        --yellow: #ffd100;
        --yellow-strong: #ffbf00;
        --border: rgba(255, 209, 0, 0.2);
        --danger: #ff9a9a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        color: var(--text);
        font-family: "Montserrat", "Segoe UI", Arial, sans-serif;
        background:
          radial-gradient(circle at 12% 14%, rgba(255, 209, 0, 0.18), transparent 32%),
          radial-gradient(circle at 88% 12%, rgba(255, 191, 0, 0.08), transparent 24%),
          linear-gradient(160deg, #0c0d10 0%, #060708 62%, #040405 100%);
      }

      .card {
        width: min(100%, 440px);
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-weight: 700;
        font-size: 0.92rem;
      }

      input {
        width: 100%;
        min-height: 50px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(5, 6, 7, 0.68);
        color: var(--text);
        padding: 0 14px;
        font: inherit;
      }

      input:focus-visible {
        outline: 2px solid rgba(255, 209, 0, 0.34);
        outline-offset: 1px;
      }

      button {
        min-height: 52px;
        border-radius: 12px;
        border: 1px solid var(--yellow);
        background: linear-gradient(180deg, var(--yellow), var(--yellow-strong));
        color: #161616;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.75;
        cursor: not-allowed;
      }

      .feedback {
        margin: 2px 0 0;
        min-height: 1.2em;
        font-size: 0.9rem;
      }

      .feedback.error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Painel de Envio</h1>
      <p>Entre com usuario e senha para acessar a area de disparo.</p>

      <form id="loginForm" novalidate>
        <label for="username">Usuario</label>
        <input id="username" name="username" autocomplete="username" required />

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button id="submitBtn" type="submit">Entrar</button>
        <p class="feedback" id="feedback" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script>
      const loginForm = document.getElementById("loginForm");
      const feedback = document.getElementById("feedback");
      const submitBtn = document.getElementById("submitBtn");

      function setFeedback(message, isError) {
        feedback.className = "feedback" + (isError ? " error" : "");
        feedback.textContent = message || "";
      }

      async function checkSession() {
        const response = await fetch("/api/auth/session");
        if (response.ok) {
          window.location.replace("/envio");
        }
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setFeedback("");
        submitBtn.disabled = true;

        const username = String(document.getElementById("username").value || "").trim();
        const password = String(document.getElementById("password").value || "");

        if (!username || !password) {
          submitBtn.disabled = false;
          setFeedback("Preencha usuario e senha.", true);
          return;
        }

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          if (!response.ok) {
            const payload = await response.json().catch(() => ({}));
            throw new Error(payload.error || "Falha no login.");
          }

          window.location.replace("/envio");
        } catch (error) {
          setFeedback(error && error.message ? error.message : "Nao foi possivel entrar.", true);
          submitBtn.disabled = false;
        }
      });

      checkSession().catch(() => null);
    </script>
  </body>
</html>
